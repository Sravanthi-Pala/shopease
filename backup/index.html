<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase - E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero {
            text-align: center;
            padding: 100px 0;
            color: white;
        }
        .btn-shop {
            background: #ffd700;
            color: #333;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
        }
        .card {
            border-radius: 15px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🛍️ ShopEase</a>
            <div>
                <a href="/login" class="btn btn-outline-light">Login</a>
            </div>
        </div>
    </nav>
    
    <div class="hero">
        <div class="container">
            <h1 class="display-3 fw-bold">Welcome to ShopEase</h1>
            <p class="lead">Your one-stop destination for amazing products at best prices!</p>
            <a href="/products" class="btn btn-shop">Shop Now →</a>
        </div>
    </div>
    
    <div class="container py-5">
        <h2 class="text-center text-white mb-5">Featured Categories</h2>
        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="card text-center p-3">
                    <i class="fas fa-mobile-alt" style="font-size: 48px; color: #667eea;"></i>
                    <h5 class="mt-3">Electronics</h5>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-center p-3">
                    <i class="fas fa-tshirt" style="font-size: 48px; color: #667eea;"></i>
                    <h5 class="mt-3">Fashion</h5>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-center p-3">
                    <i class="fas fa-shoe-prints" style="font-size: 48px; color: #667eea;"></i>
                    <h5 class="mt-3">Footwear</h5>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-center p-3">
                    <i class="fas fa-laptop" style="font-size: 48px; color: #667eea;"></i>
                    <h5 class="mt-3">Laptops</h5>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
</body>
</html>
