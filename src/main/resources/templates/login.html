<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta charset='UTF-8'>
<meta charset='UTF-8'>
    <meta charset="UTF-8">
    <title>Login - ShopEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-card { background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 2rem; animation: fadeInUp 0.6s ease; max-width: 450px; margin: 100px auto; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .btn-login { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 12px; font-weight: 600; width: 100%; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="text-center mb-4">
                <h2><i class="fas fa-store"></i> ShopEase</h2>
                <p>Login to your account</p>
            </div>
            <div th:if="${param.error}" class="alert alert-danger">Invalid email or password</div>
            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="admin@shopease.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
            <hr class="my-4">
            <div class="text-center">
                <p><strong>Demo Credentials:</strong></p>
                <p>Admin: admin@shopease.com / admin123</p>
                <p>User: user@shopease.com / user123</p>
                <a href="/" class="btn btn-link">Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
