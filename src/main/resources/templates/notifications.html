<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications - ShopEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .notification-card { background: white; border-radius: 15px; padding: 1rem; margin-bottom: 1rem; transition: 0.3s; cursor: pointer; }
        .notification-card:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .notification-unread { border-left: 4px solid #667eea; background: #f8f9ff; }
        .notification-read { opacity: 0.7; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/" style="font-size: 1.8rem;">??? ShopEase</a>
            <div>
                <a href="/notifications/mark-all-read" class="btn btn-outline-light btn-sm me-2"><i class="fas fa-check-double"></i> Mark All Read</a>
                <a href="/" class="btn btn-outline-light btn-sm"><i class="fas fa-home"></i> Back to Home</a>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <h1 class="mb-4"><i class="fas fa-bell"></i> Notifications 
            <span th:if="${unreadCount > 0}" class="badge bg-danger" th:text="${unreadCount}"></span>
        </h1>
        
        <div th:if="${notifications.isEmpty()}" class="text-center py-5 bg-white rounded-4">
            <i class="fas fa-bell-slash" style="font-size: 5rem; color: #ccc;"></i>
            <h3 class="mt-3">No notifications yet</h3>
            <p>You'll see order updates and offers here</p>
        </div>
        
        <div th:each="notif : ${notifications}" class="notification-card" th:classappend="${notif.read ? 'notification-read' : 'notification-unread'}" th:data-id="${notif.id}">
            <div class="d-flex justify-content-between">
                <div>
                    <i class="fas" th:classappend="${notif.type == 'ORDER' ? 'fa-box text-primary' : (notif.type == 'PROMO' ? 'fa-tag text-success' : 'fa-info-circle text-info')}"></i>
                    <strong th:text="${notif.title}"></strong>
                </div>
                <small class="text-muted" th:text="${#temporals.format(notif.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
            </div>
            <p class="mt-2 mb-0" th:text="${notif.message}"></p>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $('.notification-card').click(function() {
            let id = $(this).data('id');
            if (!$(this).hasClass('notification-read')) {
                $.post('/notifications/mark-read/' + id, function() {
                    location.reload();
                });
            }
        });
    </script>
</body>
</html>
